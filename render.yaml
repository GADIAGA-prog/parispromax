# Render Blueprint for the ParisPromax backend.
# Deploy: push this repo to GitHub, then in Render -> "New +" -> "Blueprint",
# pick the repo. Render creates the Postgres DB + the web service automatically.
# After the first deploy, set PUBLIC_BASE_URL to the service URL and add your
# real CinetPay keys in the dashboard (they are marked sync:false = set manually).

databases:
  - name: parispromax-db
    # Payant : le Postgres gratuit de Render EXPIRE après ~30 jours (perte de
    # données) — inutilisable en production. basic-256mb ≈ 6 $/mois.
    plan: basic-256mb
    databaseName: parispromax
    user: parispromax

services:
  - type: web
    name: parispromax-backend
    runtime: node
    # Payant (≈ 7 $/mois) : le plan free endort le serveur après inactivité
    # (premier login/paiement du matin ~30 s d'attente, webhooks retardés).
    plan: starter
    rootDir: backend
    buildCommand: npm install && npm run build:prod
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: parispromax-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "4000"
      # NE JAMAIS mettre "true" en production : l'API renverrait le code OTP
      # dans la réponse, permettant de se connecter avec n'importe quel numéro.
      - key: OTP_DEV_MODE
        value: "false"
      # --- SMS (OPTIONNEL — la connexion est par mot de passe, sans SMS) ---
      # À renseigner seulement si vous réactivez un jour l'OTP SMS :
      # SMS_PROVIDER=twilio (TWILIO_ACCOUNT_SID + TWILIO_AUTH_TOKEN) ou
      # SMS_PROVIDER=orange (ORANGE_CLIENT_ID + ORANGE_CLIENT_SECRET + ORANGE_SENDER).
      - key: SMS_PROVIDER
        sync: false
      - key: SMS_SENDER
        value: ParisPromax
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: ORANGE_CLIENT_ID
        sync: false
      - key: ORANGE_CLIENT_SECRET
        sync: false
      - key: ORANGE_SENDER
        sync: false
      - key: OTP_TTL_MINUTES
        value: "5"
      # Provider de paiement ACTIF en production : FedaPay.
      # Renseigner FEDAPAY_SECRET_KEY (clé privée live) dans le dashboard
      # Render. Le Checkout FedaPay propose Orange Money et Moov Burkina Faso.
      - key: PAYMENT_PROVIDER
        value: fedapay
      # Seul FedaPay est proposé aux clients ; les autres intégrations restent
      # dans le code mais sont masquées (réactivables en retirant de la liste).
      - key: PAYMENT_DISABLED
        value: cinetpay,paydunya,ligdicash,pawapay,feexpay
      # URLs des journaux hippiques nationaux (bouton "Journal" de l'app).
      # À renseigner UNE fois : la page du journal du jour de chaque loterie
      # (ex. LONAB). Reprises automatiquement chaque jour par l'auto-pick.
      - key: JOURNAL_URL_BF
        sync: false
      - key: JOURNAL_URL_CI
        sync: false
      - key: JOURNAL_URL_SN
        sync: false
      - key: JOURNAL_URL_TG
        sync: false
      - key: JOURNAL_URL_BJ
        sync: false
      - key: JOURNAL_URL_CG
        sync: false
      - key: FEDAPAY_MODE
        value: live
      - key: FEDAPAY_COUNTRY
        value: bf
      - key: FEDAPAY_SECRET_KEY
        sync: false
      - key: FEDAPAY_PUBLIC_KEY
        sync: false
      - key: FEDAPAY_WEBHOOK_SECRET
        sync: false
      # PayDunya (test by default). Keys are set manually in the dashboard.
      - key: PAYDUNYA_MODE
        value: test
      - key: PAYDUNYA_MASTER_KEY
        sync: false
      - key: PAYDUNYA_PRIVATE_KEY
        sync: false
      - key: PAYDUNYA_PUBLIC_KEY
        sync: false
      - key: PAYDUNYA_TOKEN
        sync: false
      - key: LIGDICASH_MODE
        value: test
      - key: LIGDICASH_API_KEY
        sync: false
      - key: LIGDICASH_TOKEN
        sync: false
      # FeexPay API v2 : dashboard app-v2.feexpay.me -> Développeurs.
      # FEEXPAY_SHOP_ID = onglet "Identifiant" ; FEEXPAY_TOKEN = "Clé privée".
      # Webhook à déclarer : <PUBLIC_BASE_URL>/payments/feexpay/webhook
      - key: FEEXPAY_MODE
        value: LIVE
      - key: FEEXPAY_SHOP_ID
        sync: false
      - key: FEEXPAY_TOKEN
        sync: false
      # Secret partagé du webhook (Bearer) — à inventer, pas la clé privée.
      - key: FEEXPAY_WEBHOOK_SECRET
        sync: false
      # pawaPay v2 sandbox. Callback à déclarer dans le dashboard :
      # <PUBLIC_BASE_URL>/payments/pawapay/webhook
      - key: PAWAPAY_MODE
        value: sandbox
      - key: PAWAPAY_API_TOKEN
        sync: false
      - key: SUB_PRICE_XOF
        value: "5000"
      - key: SUB_PERIOD_DAYS
        value: "30"
      - key: ADMIN_USER
        value: admin
      # The following are set manually in the Render dashboard (secrets / post-deploy):
      - key: ADMIN_PASSWORD
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      # CinetPay new API: API key (sk_test_/sk_live_) + API password.
      - key: CINETPAY_API_KEY
        sync: false
      - key: CINETPAY_API_PASSWORD
        sync: false
      - key: CRON_TOKEN
        generateValue: true
      # --- MODULE 3 : temps réel + LTR ---
      # Redis (file/cache/websocket). Active socket.io + worker dès qu'il est défini.
      - key: REDIS_URL
        fromService:
          type: redis
          name: parispromax-redis
          property: connectionString
      # URL du micro-service IA. À DÉFINIR (sync:false) une fois l'IA + le modèle
      # en ligne : https://parispromax-ia.onrender.com  -> bascule les pronostics
      # sur le vrai LTR (repli JS automatique si absent/injoignable).
      - key: IA_URL
        sync: false
      # Jeton Bearer exigé par le micro-service IA (doit être IDENTIQUE à
      # PPM_IA_TOKEN sur parispromax-ia). À définir manuellement sur les 2.
      - key: IA_TOKEN
        sync: false

  # Micro-service d'inférence IA (FastAPI + CatBoost), image Docker depuis ./ml.
  - type: web
    name: parispromax-ia
    runtime: docker
    # Payant (≈ 7 $/mois) : évite le cold start du modèle avant chaque course.
    plan: starter
    rootDir: ml
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PPM_MODEL_PATH
        value: /app/model/model.cbm
      - key: DATABASE_URL
        fromDatabase:
          name: parispromax-db
          property: connectionString
      # Jeton Bearer exigé sur /predict (même valeur que IA_TOKEN côté backend).
      # Tant qu'il n'est pas défini, /predict reste ouvert (compat) — à définir.
      - key: PPM_IA_TOKEN
        sync: false

# Redis managé (file d'attente + cache prédictions + pub WebSocket).
# Si Render refuse `type: redis`, créez un "Key Value" dans le dashboard et
# renseignez REDIS_URL (Internal URL) à la main sur les 2 services.
  - type: redis
    name: parispromax-redis
    # Payant (≈ 10 $/mois) : cache prédictions + temps réel persistants.
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
