name: Build signed Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - codex/apk-test-sdk56

permissions:
  contents: read

jobs:
  android-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CI: "1"
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Expo dependencies
        run: npx expo install --check

      - name: Build signed APK with EAS
        run: npx eas-cli@latest build --platform android --profile production-apk --non-interactive --wait --json > eas-build.json

      - name: Download APK
        shell: bash
        run: |
          APK_URL="$(node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync('eas-build.json','utf8'));const b=Array.isArray(d)?d[0]:d;process.stdout.write(b.artifacts.applicationArchiveUrl)")"
          curl --fail --location "$APK_URL" --output parispromax-production.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: parispromax-production-apk
          path: parispromax-production.apk
          if-no-files-found: error
          retention-days: 14
