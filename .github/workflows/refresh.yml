name: Scrape races (full refresh)

# Full refresh: load the day's free PMU programme + detect results.
# Runs a few times a day so odds published closer to post time get folded into
# the AI predictions (re-ranking). Frequent RESULTS detection is a separate,
# lighter workflow (results.yml).
#
# Setup: repo secret CRON_TOKEN = the backend's CRON_TOKEN env var (Render).

on:
  schedule:
    - cron: '0 6 * * *'     # 06:00 au Burkina Faso
    - cron: '0 11 * * *'    # 11:00 UTC — midday (odds start publishing)
    - cron: '30 15 * * *'   # 15:30 UTC — afternoon (fresh odds)
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger full refresh
        run: |
          curl -fsS -X POST \
            -H "x-cron-token: ${{ secrets.CRON_TOKEN }}" \
            "https://parispromax-backend.onrender.com/cron/refresh" \
            --max-time 60 --retry 3 --retry-delay 20 --retry-all-errors
          echo ""

      - name: Wait for background ingestion
        run: sleep 180

      - name: Reconcile the national Quinte pick
        run: |
          curl -fsS -X POST \
            -H "x-cron-token: ${{ secrets.CRON_TOKEN }}" \
            "https://parispromax-backend.onrender.com/cron/picks" \
            --max-time 60 --retry 3 --retry-delay 20 --retry-all-errors
          echo ""
