name: Scrape races (full refresh)

# Full refresh: scrape the day's programme (geny.com) + detect results.
# Runs a few times a day so odds published closer to post time get folded into
# the AI predictions (re-ranking). Frequent RESULTS detection is a separate,
# lighter workflow (results.yml).
#
# Setup: repo secret CRON_TOKEN = the backend's CRON_TOKEN env var (Render).

on:
  schedule:
    - cron: '30 6 * * *'    # 06:30 UTC — morning programme
    - cron: '0 11 * * *'    # 11:00 UTC — midday (odds start publishing)
    - cron: '30 15 * * *'   # 15:30 UTC — afternoon (fresh odds)
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger full refresh
        run: |
          curl -fsS -X POST \
            "https://parispromax-backend.onrender.com/cron/refresh?token=${{ secrets.CRON_TOKEN }}" \
            --max-time 60
          echo ""
